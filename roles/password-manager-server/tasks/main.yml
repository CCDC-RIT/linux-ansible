- name: Check if manager already installed
  ansible.builtin.stat:
    path: /opt/ccdc-password-manager/docker-compose.yml
  register: manager_exists

- name: Setup manager
  block:
    - name: Create directory
      ansible.builtin.file:
        path: "/opt/ccdc-password-manager"
        owner: blueteam
        group: blueteam
        state: directory
        mode: 0755

    - name: Copy Image
      ansible.builtin.copy:
        src: /opt/passwordmanager/password-manager-latest.tar.gz
        dest: /opt/ccdc-password-manager/password-manager-latest.tar.gz

    - name: Copy Compose File
      ansible.builtin.copy:
        src: /opt/passwordmanager/docker-compose.yml
        dest: /opt/ccdc-password-manager/docker-compose.yml

    - name: Copy starting clients
      ansible.builtin.copy:
        src: /opt/passwordmanager/starting_clients.txt
        dest: /opt/ccdc-password-manager/starting_clients.txt
        mode: '0644'

    - name: Copy setup script
      ansible.builtin.copy:
        src: setup-password-manager-server.sh
        dest: /opt/ccdc-password-manager/setup-password-manager-server.sh
        mode: '0744'

    - name: Run setup script
      ansible.builtin.command: ./setup-password-manager-server.sh
      args:
        chdir: /opt/ccdc-password-manager
  when: not manager_exists.stat.exists and ansible_default_ipv4.address == password_manager_ip
