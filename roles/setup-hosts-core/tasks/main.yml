- name: Apt update (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'
  ignore_errors: true

- name: Dnf update (RHEL/CentOS)
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_facts['os_family'] == 'RedHat'
  ignore_errors: true

- name: Zypper update (SUSE)
  community.general.zypper:
    update_cache: true
  when: ansible_facts['os_family'] == 'Suse'
  ignore_errors: true

- name: Install Packages for backups and firewall
  package:
    name: "{{ item }}"
    state: present
  with_items:
     - "lsof"
     - "vim"
     - "curl"
     - "iptables"
     - "iptables-persistent"
     - "unzip"
     - "zip"
  ignore_errors: true

- name: Set PATH in /etc/environment
  lineinfile:
    path: /etc/environment
    line: 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"'
    create: yes