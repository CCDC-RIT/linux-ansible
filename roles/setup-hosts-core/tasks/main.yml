---
- name: Gather facts for localhost
  ansible.builtin.setup:

- name: Gather package facts
  ansible.builtin.package_facts:

- name: Add blueteam user
  ansible.builtin.user: 
    name: blueteam
    state: present
    password: "{{ blueteam_password | password_hash('sha512') }}"
    shell: /bin/bash
  when: ansible_facts['os_family'] != 'Alpine'

- name: Add blueteam user (Alpine)
  ansible.builtin.user:
    name: blueteam
    state: present
    password: "{{ blueteam_password | password_hash('sha512') }}"
    shell: /bin/sh
  when: ansible_facts['os_family'] == 'Alpine'

- name: Make blueteam group
  ansible.builtin.group:
    name: blueteam
    state: present

- name: Create wheel group if doesn't exist on RedHat
  ansible.builtin.shell: groupadd -f wheel
  when: ansible_facts['os_family'] == 'RedHat'
 
- name: Add blueteam user to admin groups (RedHat)
  ansible.builtin.user:
    name: blueteam
    groups: '{{ item }}'
    append: yes
  with_items:
    - "wheel"
    - "adm"
    - "blueteam"
  when: ansible_facts['os_family'] == 'RedHat'

- name: Add blueteam user to admin groups (Debian)
  ansible.builtin.user:
    name: blueteam
    groups: '{{ item }}'
    append: yes
  with_items:
    - "sudo"
    - "adm"
    - "blueteam"
  when: ansible_facts['os_family'] == 'Debian'

- name: Add key to blueteam user
  ansible.posix.authorized_key:
    user: blueteam
    state: present
    key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_ed25519.pub') }}"

- name: Create backup directory
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    owner: blueteam
    group: blueteam
    state: directory

- name: Create quarantine directory
  ansible.builtin.file:
    path: "{{ quarantine }}"
    owner: blueteam
    group: blueteam
    state: directory

- name: Create inventory directory
  ansible.builtin.file:
    path: "/opt/inventory"
    owner: blueteam
    group: blueteam
    state: directory
    mode: 0755

- name: Create audit directory
  ansible.builtin.file:
    path: "{{ audit_dir }}"
    owner: blueteam
    group: blueteam
    state: directory
    mode: 0755

