---
- name: Deploy backup potentially important files script
  ansible.builtin.template:
    src: backup_important_files.j2
    dest: /tmp/imp_files.sh
    owner: root
    group: root
    mode: 0744
  
- name: Run backup important files script
  ansible.builtin.shell: /tmp/imp_files.sh
  args:
    creates: "{{ backup_dir }}/important_files/log.txt"

- name: Create backup directory on worker nodes
  ansible.builtin.file:
    path: "{{ backups_dir }}/system_backups"
    state: directory
    mode: '0755'

- name: Archive important directories on worker nodes
  ansible.builtin.file: |
    tar -cpzf /opt/backups/system_backups/{{ inventory_hostname }}_backup_{{ ansible_date_time.date }}.tar.gz /etc /bin /usr/lib/systemd
  ignore_errors: true

- name: Fetch the backup archive to the manager node
  ansible.builtin.fetch:
    src: "/opt/backups/system_backups/{{ inventory_hostname }}_backup_{{ ansible_date_time.date }}.tar.gz"
    dest: "/opt/backups"
    flat: yes
  ignore_errors: true

