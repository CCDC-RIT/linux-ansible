---
- name: Deploy backup potentially important files script
  ansible.builtin.template:
    src: backup_important_files.j2
    dest: /tmp/imp_files.sh
    owner: root
    group: root
    mode: 0744
  
- name: Run backup important files script
  ansible.builtin.shell: /tmp/imp_files.sh
  args:
    creates: "{{ backup_dir }}/important_files/log.txt"

- name: Create backup directory on worker nodes
  ansible.builtin.file:
    path: "{{ backup_dir }}/system_backups"
    state: directory
    mode: '0755'

- name: Set backup file path
  ansible.builtin.set_fact:
    backup_path: "{{ backup_dir }}/system_backups/{{ inventory_hostname }}_backup_{{ ansible_date_time.date }}.tar.gz"

- name: Archive important directories on worker nodes
  ansible.builtin.shell: |
    tar -cpzf {{ backup_path }} /etc /usr/bin /usr/lib/systemd
  ignore_errors: true

- name: Make backup readable
  ansible.builtin.file:
    path: "{{ backup_path }}"
    mode: "0644"

- name: Fetch the backup archive to the manager node
  ansible.posix.synchronize:
    mode: pull
    src: "{{ backup_path }}"
    dest: "/opt/backups"
  delegate_to: localhost
  become: false
  timeout: 45
  ignore_errors: true

