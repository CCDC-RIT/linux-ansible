---
- name: Gather facts for localhost
  ansible.builtin.setup:

- name: Gather package facts
  ansible.builtin.package_facts:

- name: Install Useful Packages Debian
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - "openssl"
    - "libssl-dev"
    - "automake"
    - "libtool"
    - "make"
    - "gcc"
    - "pkg-config"
    - "snoopy"
    - "lynis"
    - "jq"
    - "git"
    - "whois"
    - "gnupg"
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    UCF_FORCE_CONFOLD: "true"
  timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: Install Useful Packages RedHat
  package:
    name: "{{ item }}"
    state: present
  with_items:
    - "openssl"
    - "openssl-devel"
    - "automake"
    - "libtool"
    - "make"
    - "gcc"
    - "pkg-config"
    - "epel-release" # should fix snoopy and lynis
    - "snoopy"
    - "lynis"
    - "jq"
    - "git"
    - "whois"
    - "gnupg2"
  ignore_errors: true
  environment:
    DEBIAN_FRONTEND: noninteractive
    UCF_FORCE_CONFOLD: "true"
  timeout: 300
  when: ansible_facts['os_family'] == "RedHat"

- name: Create Yara directory
  ansible.builtin.file:
    path: /opt/yara
    state: directory
    owner: blueteam
    group: blueteam
    mode: 0755

- name: Copy yara files needed
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/yara/{{ item }}"
    owner: blueteam
    group: blueteam
    mode: 0664
  with_items:
    - "Linux.zip"
    - "Multi.zip"
    - "yara-forge-rules-full.zip"
    - "yara.tar.gz"

- name: Copy Yara setup script
  ansible.builtin.copy:
    src: yara-setup.sh
    dest: /opt/yara-setup.sh
    owner: blueteam
    group: blueteam
    mode: 0744

- name: Run Yara setup script
  ansible.builtin.shell: /opt/yara-setup.sh
  ignore_errors: true