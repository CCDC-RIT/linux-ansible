- name: Finishing tasks (keep talking)
  hosts: all
  become: yes
  roles:
    - finishing_tasks
  tags:
    - never
    - deploy
    - finish

#If not installed, add deploy tag to falco. If not, just modify compose file for sidekick with Grafana IP

- name: Deploy Falco
  hosts: all
  become: yes
  roles:
    - falco
  tags:
    - never
    - falco
    
- name: Deploy Falco Sidekick
  hosts: all
  become: yes
  roles:
    - falco-sidekick
  tags:
    - never
    - deploy
    - falco
    - falcosidekick